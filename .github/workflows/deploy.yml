name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_BACKEND: 940278683083.dkr.ecr.ap-southeast-1.amazonaws.com/ilovetng-backend
  ECR_FRONTEND: 940278683083.dkr.ecr.ap-southeast-1.amazonaws.com/ilovetng-frontend
  ECS_CLUSTER: ilovetng-application-cluster
  ECS_SERVICE_BACKEND: ilovetng-backend-service-m50b2zoq
  ECS_SERVICE_FRONTEND: ilovetng-frontend-service-1h78j0to

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'ci/docker/backend/**'
              - 'ci/task-definitions/backend.json'
            frontend:
              - 'frontend/**'
              - 'ci/docker/frontend/**'
              - 'ci/task-definitions/frontend.json'

  build-deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::940278683083:role/ilovetng-service-account-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_BACKEND }}:latest
            ${{ env.ECR_BACKEND }}:${{ github.sha }}

      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ci/task-definitions/backend.json
          container-name: backend
          image: ${{ env.ECR_BACKEND }}:${{ github.sha }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_BACKEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  build-deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::940278683083:role/ilovetng-service-account-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_FRONTEND }}:latest
            ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://scambuster-alb-399113752.ap-southeast-1.elb.amazonaws.com

      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ci/task-definitions/frontend.json
          container-name: frontend
          image: ${{ env.ECR_FRONTEND }}:${{ github.sha }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_FRONTEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
